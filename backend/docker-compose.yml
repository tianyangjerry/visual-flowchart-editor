services:
  postgres:
    image: postgres:16-alpine
    container_name: flowchat-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowchat
    ports:
      - "5432:5432"
    volumes:
      - flowchat_pgdata:/var/lib/postgresql/data

volumes:
  flowchat_pgdata:
